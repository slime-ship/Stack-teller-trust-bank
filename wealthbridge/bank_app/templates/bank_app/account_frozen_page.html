    <title>Pending Transaction - STT Bank</title>
    <style>
        :root {
            --light-blue: #000000;
            --primary-blue: #ffffff;
            --dark-blue: #ffffff;
            --accent-blue: #a3a3a3;
            --soft-gray: #000000;
            --medium-gray: rgba(255, 255, 255, 0.1);
            --text-dark: #ffffff;
            --text-light: #9ca3af;
            --success: #27AE60;
            --warning: #E67E22;
            --error: #E74C3C;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Source Sans Pro', sans-serif;
            background: linear-gradient(135deg, var(--light-blue) 0%, var(--soft-gray) 100%);
            color: var(--text-dark);
            min-height: 100vh;
            overflow: auto;
        }

        .dashboard {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .loading-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 15px 35px rgba(42, 110, 187, 0.15);
            animation: slideUp 0.8s ease-out 0.3s both;
            max-width: 500px;
            width: 90%;
            text-align: center;
            border: 1px solid var(--medium-gray);
            position: relative;
            overflow: hidden;
            transform: translateY(30px);
            opacity: 0;
        }

        .loading-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, var(--primary-blue) 0%, var(--accent-blue) 100%);
            animation: colorFlow 3s ease-in-out infinite;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes colorFlow {
            0%, 100% {
                background: linear-gradient(90deg, var(--primary-blue) 0%, var(--accent-blue) 100%);
            }
            50% {
                background: linear-gradient(90deg, var(--accent-blue) 0%, var(--primary-blue) 100%);
            }
        }

        .loading-container h2 {
            color: var(--dark-blue);
            margin-bottom: 20px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 1.8rem;
            position: relative;
            padding-bottom: 15px;
            animation: fadeIn 0.8s ease-out 0.6s both;
        }

        .loading-container h2::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: var(--primary-blue);
            border-radius: 2px;
            animation: expandWidth 0.8s ease-out 0.8s both;
        }

        @keyframes expandWidth {
            from {
                width: 0;
            }
            to {
                width: 80px;
            }
        }

        .message {
            margin-top: 25px;
            color: var(--text-dark);
            font-size: 1.1rem;
            line-height: 1.6;
            padding: 15px;
            background: rgba(42, 110, 187, 0.08);
            border-radius: 10px;
            border-left: 4px solid var(--warning);
            animation: fadeIn 0.8s ease-out 1s both;
            transform-origin: left;
        }

        .message a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .message a:hover {
            text-decoration: underline;
            color: var(--dark-blue);
        }

        .support-button {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--accent-blue) 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(42, 110, 187, 0.25);
            animation: fadeIn 0.8s ease-out 1.2s both;
            position: relative;
            overflow: hidden;
        }

        .support-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(42, 110, 187, 0.35);
            color: white;
            text-decoration: none;
        }

        .support-button:active {
            transform: translateY(-1px);
        }

        .support-button::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.3s ease, height 0.3s ease;
        }

        .support-button:hover::after {
            width: 300px;
            height: 300px;
        }

        /* Email Support Section */
        .email-support {
            margin-top: 25px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 10px;
            border: 1px solid var(--medium-gray);
            animation: fadeIn 0.8s ease-out 1.4s both;
        }

        .email-support p {
            margin-bottom: 10px;
            color: var(--text-dark);
            font-size: 1rem;
        }

        .email-link {
            color: var(--primary-blue);
            font-weight: 600;
            text-decoration: none;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            display: inline-block;
            padding: 8px 16px;
            border-radius: 6px;
            background: rgba(42, 110, 187, 0.1);
        }

        .email-link:hover {
            color: var(--dark-blue);
            background: rgba(42, 110, 187, 0.2);
            transform: translateY(-2px);
            text-decoration: none;
        }

        .support-note {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-top: 10px;
            font-style: italic;
        }

        /* Infinity Preloader Styles */
        .ip {
            width: 256px;
            height: 128px;
            margin: 0 auto;
            animation: fadeIn 0.8s ease-out 0.4s both;
        }

        .ip__track {
            stroke: var(--medium-gray);
            transition: stroke var(--trans-dur);
        }

        .ip__worm1,
        .ip__worm2 {
            animation: worm1 2s linear infinite;
        }

        .ip__worm2 {
            animation-name: worm2;
        }

        /* Animation */
        @keyframes worm1 {
            from {
                stroke-dashoffset: 0;
            }
            50% {
                animation-timing-function: steps(1);
                stroke-dashoffset: -358;
            }
            50.01% {
                animation-timing-function: linear;
                stroke-dashoffset: 358;
            }
            to {
                stroke-dashoffset: 0;
            }
        }

        @keyframes worm2 {
            from {
                stroke-dashoffset: 358;
            }
            50% {
                stroke-dashoffset: 0;
            }
            to {
                stroke-dashoffset: -358;
            }
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        /* Status Indicator */
        .status-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            padding: 12px 20px;
            background: rgba(230, 126, 34, 0.1);
            border-radius: 8px;
            border-left: 4px solid var(--warning);
            animation: shake 0.8s ease-out 0.5s both, pulseWarning 2s ease-in-out infinite 1s;
        }

        .status-icon {
            font-size: 1.5rem;
            color: var(--warning);
            margin-right: 10px;
            animation: bounce 2s ease-in-out infinite;
        }

        .status-text {
            font-weight: 600;
            color: var(--text-dark);
            font-family: 'Montserrat', sans-serif;
        }

        @keyframes shake {
            0%, 100% {
                transform: translateX(0);
            }
            10%, 30%, 50%, 70%, 90% {
                transform: translateX(-5px);
            }
            20%, 40%, 60%, 80% {
                transform: translateX(5px);
            }
        }

        @keyframes pulseWarning {
            0%, 100% {
                background: rgba(230, 126, 34, 0.1);
                border-left-color: var(--warning);
            }
            50% {
                background: rgba(230, 126, 34, 0.2);
                border-left-color: #ff8c00;
            }
        }

        /* Ice Effect for Frozen State */
        .frozen-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg,
                rgba(255, 255, 255, 0.1) 0%,
                rgba(255, 255, 255, 0.05) 50%,
                rgba(255, 255, 255, 0.1) 100%);
            pointer-events: none;
            opacity: 0.3;
            animation: frostShimmer 3s ease-in-out infinite;
        }

        @keyframes frostShimmer {
            0%, 100% {
                opacity: 0.2;
            }
            50% {
                opacity: 0.4;
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .loading-container {
                padding: 30px 20px;
                width: 95%;
            }

            .loading-container h2 {
                font-size: 1.5rem;
            }

            .message {
                font-size: 1rem;
            }

            .ip {
                width: 200px;
                height: 100px;
            }

            .email-support {
                padding: 15px;
            }

            .email-link {
                font-size: 1rem;
                padding: 6px 12px;
            }
        }

        .telegram-float {
            position: fixed;
            left: 20px;
            bottom: 20px;
            z-index: 1000;
            animation: float 3s ease-in-out infinite;
        }

        .telegram-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            background: #0088cc;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .telegram-link:hover {
            background: #0077b5;
            transform: scale(1.1);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
        }

        .telegram-icon {
            width: 30px;
            height: 30px;
            filter: brightness(0) invert(1);
        }

        .telegram-tooltip {
            position: absolute;
            left: 70px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 14px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .telegram-link:hover .telegram-tooltip {
            opacity: 1;
        }

        @keyframes float {
            0% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
            100% {
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .telegram-float {
                left: 10px;
                bottom: 10px;
            }

            .telegram-link {
                width: 50px;
                height: 50px;
            }

            .telegram-icon {
                width: 25px;
                height: 25px;
            }
        }

<body>

    <div class="dashboard">
        <div class="loading-container">
            <!-- Frozen Effect Overlay -->
            <div class="frozen-effect"></div>

            <!-- Status Indicator -->
            <div class="status-indicator">
                <i class="fas fa-exclamation-triangle status-icon"></i>
                <span class="status-text">Account Status: Restricted</span>
            </div>

            <!-- Infinity Preloader -->
            <main>
                <svg class="ip" viewBox="0 0 256 128" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="grad1" x1="0" y1="0" x2="1" y2="0">
                            <stop offset="0%" stop-color="#2A6EBB" />
                            <stop offset="33%" stop-color="#4A90E2" />
                            <stop offset="67%" stop-color="#1A4A7A" />
                            <stop offset="100%" stop-color="#2A6EBB" />
                        </linearGradient>
                        <linearGradient id="grad2" x1="1" y1="0" x2="0" y2="0">
                            <stop offset="0%" stop-color="#2A6EBB" />
                            <stop offset="33%" stop-color="#1A4A7A" />
                            <stop offset="67%" stop-color="#4A90E2" />
                            <stop offset="100%" stop-color="#2A6EBB" />
                        </linearGradient>
                    </defs>
                    <g fill="none" stroke-linecap="round" stroke-width="16">
                        <g class="ip__track" stroke="#E1E8ED">
                            <path d="M8,64s0-56,60-56,60,112,120,112,60-56,60-56"/>
                            <path d="M248,64s0-56-60-56-60,112-120,112S8,64,8,64"/>
                        </g>
                        <g stroke-dasharray="180 656">
                            <path class="ip__worm1" stroke="url(#grad1)" stroke-dashoffset="0" d="M8,64s0-56,60-56,60,112,120,112,60-56,60-56"/>
                            <path class="ip__worm2" stroke="url(#grad2)" stroke-dashoffset="358" d="M248,64s0-56-60-56-60,112-120,112S8,64,8,64"/>
                        </g>
                    </g>
                </svg>
            </main>

            <h2>Transactions Frozen</h2>

            <p class="message">
                Your account transactions have been temporarily frozen due to suspicious activity.
                Please contact customer support for verification and assistance.
            </p>

            <a href="#" class="support-button">
                <i class="fas fa-headset" style="margin-right: 8px;"></i>
                Contact Live Support
            </a>
        </div>
    </div>

    <script>
        // Add subtle interactive effects
        document.addEventListener('DOMContentLoaded', function() {
            const supportButton = document.querySelector('.support-button');
            const emailLink = document.querySelector('.email-link');
            const statusIndicator = document.querySelector('.status-indicator');

            // Add click effect to support button
            supportButton.addEventListener('click', function(e) {
                e.preventDefault();

                // Add a temporary pulse effect
                this.style.animation = 'none';
                setTimeout(() => {
                    this.style.animation = 'fadeIn 0.8s ease-out 1.2s both';
                }, 10);

                // You can add actual support functionality here
                console.log('Support button clicked');
            });

            // Add click effect to email link
            emailLink.addEventListener('click', function(e) {
                // Add a temporary highlight effect
                this.style.transform = 'scale(1.05)';
                setTimeout(() => {
                    this.style.transform = 'scale(1)';
                }, 200);
            });

            // Add hover effect to status indicator
            statusIndicator.addEventListener('mouseenter', function() {
                this.style.transform = 'scale(1.02)';
            });

            statusIndicator.addEventListener('mouseleave', function() {
                this.style.transform = 'scale(1)';
            });
        });
         if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register("{% static 'sw.js' %}")
        .then(registration => {
            console.log('✅ Service Worker Registered:', registration);

            // Check for updates
            registration.addEventListener('updatefound', () => {
                const newWorker = registration.installing;
                console.log('🔄 New service worker found:', newWorker);
            });
        })
        .catch(error => {
            console.log('❌ Service Worker registration failed:', error);
        });
    }
    </script>
</body>
