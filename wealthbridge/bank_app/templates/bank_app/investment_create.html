<body>

    <header class="bank-header">
        <h1>Stack Teller Trust Bank</h1>
        <div class="notification-bell" onclick="toggleSidebar()">
            <i class="fas fa-bell"></i>
        </div>
        <div class="open-sidebar-btn" onclick="toggleSidebar()">
            <i class="fas fa-bars"></i>
        </div>
    </header>

    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>Account Menu</h2>
            <button onclick="toggleSidebar()">Close</button>
        </div>
        <div class="user-details">
            <p>Username: <strong>{{ request.user }}</strong></p>
            <p>Email: <strong>{{ user_profile.email }}</strong></p>
        </div>
        <ul>
            <li><a href="{% url 'dashboard' %}">Dashboard</a></li>
            <li><a href="{% url 'investment_plans' %}">Investments</a></li>
            <li><a href="{% url 'transaction' %}">Transactions</a></li>
            <li><a href="{% url 'setting' %}">Profile</a></li>
            <li><a href="{% url 'logout' %}">Logout</a></li>
        </ul>
    </div>

    <!-- Marquee for Stock Market -->
    <div class="marquee">
        <div class="marquee-content" id="stockMarquee">
            Loading stock market data...
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="card-container">
            <div class="card-header">
                <h2>Create New Investment</h2>
            </div>
            <div class="card-body">
                <!-- Balance Display -->
                <div class="balance-display">
                    <div class="balance-label">AVAILABLE BALANCE</div>
                    <div class="balance-amount">${{ user_profile.balance|intcomma }}</div>
                </div>

                {% if form.errors %}
                <div class="error-messages">
                    {% for field, errors in form.errors.items %}
                        {% for error in errors %}
                            <p>{{ error }}</p>
                        {% endfor %}
                    {% endfor %}
                </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}

                    <div class="form-group">
                        <label for="{{ form.plan.id_for_label }}" class="form-label">Investment Plan</label>
                        {{ form.plan }}
                    </div>

                    <div class="form-group">
                        <label for="{{ form.amount.id_for_label }}" class="form-label">Investment Amount ($)</label>
                        {{ form.amount }}
                        <small class="form-text text-muted">
                            Enter the amount you want to invest in USD
                        </small>
                    </div>

                    <!-- Plan Details Card -->
                    <div class="plan-details-card" id="plan-details">
                        <h5>Plan Details</h5>
                        <div class="detail-item" id="min-amount"></div>
                        <div class="detail-item" id="max-amount"></div>
                        <div class="detail-item" id="interest-rate"></div>
                        <div class="detail-item" id="duration"></div>
                        <div class="detail-item" id="expected-return" style="font-weight: bold; color: #28a745;"></div>
                    </div>

                    <button type="submit" class="btn-submit">
                        Confirm Investment
                    </button>

                    <a href="{% url 'investment_plans' %}" class="btn-submit" style="background-color: #6c757d; text-align: center; display: block; text-decoration: none; margin-top: 10px;">
                        Back to Plans
                    </a>
                </form>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation Bar -->
    <nav class="bottom-navbar">
        <a href="{% url 'dashboard' %}" class="nav-item">
            <i class="fas fa-home nav-icon"></i>
            <span class="nav-label">Home</span>
        </a>
        <a href="{% url 'investment_plans' %}" class="nav-item">
            <i class="fas fa-chart-line nav-icon"></i>
            <span class="nav-label">Invest</span>
        </a>
        <a href="{% url 'transaction' %}" class="nav-item">
            <i class="fas fa-exchange-alt nav-icon"></i>
            <span class="nav-label">Transfer</span>
        </a>
        <a href="{% url 'setting' %}" class="nav-item">
            <i class="fas fa-user nav-icon"></i>
            <span class="nav-label">Profile</span>
        </a>
    </nav>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
        }

        document.addEventListener('DOMContentLoaded', function() {
            const planSelect = document.getElementById('id_plan');
            const amountInput = document.getElementById('id_amount');
            const planDetails = document.getElementById('plan-details');

            const plans = {
                {% for plan in form.fields.plan.queryset %}
                '{{ plan.id }}': {
                    min_amount: '{{ plan.min_amount }}',
                    max_amount: '{{ plan.max_amount }}',
                    interest_rate: '{{ plan.interest_rate }}',
                    duration_days: '{{ plan.duration_days }}',
                    name: '{{ plan.name }}'
                },
                {% endfor %}
            };

            function updatePlanDetails() {
                const selectedPlan = plans[planSelect.value];
                if (selectedPlan) {
                    planDetails.style.display = 'block';
                    document.getElementById('min-amount').textContent =
                        `Minimum: $${parseFloat(selectedPlan.min_amount).toLocaleString()}`;
                    document.getElementById('max-amount').textContent =
                        `Maximum: $${parseFloat(selectedPlan.max_amount).toLocaleString()}`;
                    document.getElementById('interest-rate').textContent =
                        `Interest Rate: ${selectedPlan.interest_rate}% per annum`;
                    document.getElementById('duration').textContent =
                        `Duration: ${selectedPlan.duration_days} days`;

                    updateExpectedReturn();
                } else {
                    planDetails.style.display = 'none';
                }
            }

            function updateExpectedReturn() {
                const selectedPlan = plans[planSelect.value];
                const amount = parseFloat(amountInput.value) || 0;

                if (selectedPlan && amount > 0) {
                    const dailyRate = parseFloat(selectedPlan.interest_rate) / 365 / 100;
                    const days = parseInt(selectedPlan.duration_days);
                    const expectedReturn = amount * (1 + dailyRate * days);
                    const profit = expectedReturn - amount;

                    document.getElementById('expected-return').textContent =
                        `Expected Return: $${expectedReturn.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})} (Profit: $${profit.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})})`;
                } else {
                    document.getElementById('expected-return').textContent = 'Expected Return: $0.00';
                }
            }

            planSelect.addEventListener('change', updatePlanDetails);
            amountInput.addEventListener('input', updateExpectedReturn);

            // Initialize if plan is preselected from URL
            const urlParams = new URLSearchParams(window.location.search);
            const planId = urlParams.get('plan');
            if (planId) {
                planSelect.value = planId;
                updatePlanDetails();
            }

            // Stock market data
            const stockData = [
                { symbol: "AAPL", price: 178.23 },
                { symbol: "GOOGL", price: 123.45 },
                { symbol: "AMZN", price: 99.12 },
                { symbol: "TSLA", price: 246.78 }
            ];

            function updateStockMarquee() {
                const marquee = document.getElementById("stockMarquee");
                const stockText = stockData.map(stock => `${stock.symbol}: $${stock.price.toFixed(2)}`).join(" | ");
                marquee.innerHTML = stockText;
            }

            setTimeout(updateStockMarquee, 1000);
        });

        document.getElementById("telegramBtn").addEventListener("click", function() {
            window.open("https://t.me/CRESTLINE_BANK_11", "_blank");
        });
    </script>
<script src="{% static 'js/site_controls.js' %}"></script>
</body>
</html>
